name: Build lecture PDFs

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    paths:
      - ".github/workflows/build-pdfs.yml"
      - "shared/**/*.tex"
      - "mathematical_lectures/**/*.tex"
      - "mathematical_lectures/**/build.sh"
      - "physics_lectures/**/*.tex"
      - "physics_lectures/**/build.sh"
      - "!mathematical_lectures/basic_mathematics/prezentation/**"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: build-pdfs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-pdfs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Repair scalar-field TeX control characters
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          root = Path("physics_lectures/classical_field_theory/chapters/the_real_scalar_field")
          files = sorted(root.glob("*.tex"))
          replacements = (
              (bytes([12]) + b"rac", b"\\frac"),
              (bytes([11]) + b"arepsilon", b"\\varepsilon"),
              (bytes([9]) + b"ext", b"\\text"),
          )

          for path in files:
              data = path.read_bytes()
              original = data
              for old, new in replacements:
                  data = data.replace(old, new)
              text = data.decode("utf-8")

              if path.name == "02_massless_and_massive_field_equations.tex":
                  text = text.replace(
                      "\\boxed{\n\\phi=a\\phi_{1}+b\\phi_{2}\n}.\n\\]\n\nThis property allows",
                      "\\boxed{\n\\phi=a\\phi_{1}+b\\phi_{2}\n}\n\\]\n\nis also a solution.\n\nThis property allows",
                      1,
                  )
              if path.name == "03_plane_wave_solutions.tex":
                  text = text.replace(
                      "\\boxed{\n\\phi=a\\phi_{1}+b\\phi_{2}\n}.\n\\]\n\nA general free field may",
                      "\\boxed{\n\\phi=a\\phi_{1}+b\\phi_{2}\n}\n\\]\n\nis also a solution.\n\nA general free field may",
                      1,
                  )

              data = text.encode("utf-8")
              if data != original:
                  path.write_bytes(data)

          forbidden = []
          for path in files:
              for offset, value in enumerate(path.read_bytes()):
                  if (value < 32 and value not in (10, 13)) or value == 127:
                      forbidden.append((str(path), offset, value))

          if forbidden:
              for item in forbidden:
                  print("Forbidden control byte:", item)
              raise SystemExit("Control-character verification failed")

          for name in (
              "02_massless_and_massive_field_equations.tex",
              "03_plane_wave_solutions.tex",
          ):
              if "is also a solution." not in (root / name).read_text(encoding="utf-8"):
                  raise SystemExit(f"Missing restored sentence in {name}")
          PY

          if ! git diff --quiet -- physics_lectures/classical_field_theory/chapters/the_real_scalar_field; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add physics_lectures/classical_field_theory/chapters/the_real_scalar_field
            git commit -m "Repair scalar field TeX control characters"
            git push origin HEAD:"${GITHUB_REF_NAME}"
          fi

      - name: Detect projects to build
        id: detect
        run: |
          set -euo pipefail

          all_projects=(
            "mathematical_lectures/basic_mathematics"
            "mathematical_lectures/mathematical_stories"
            "mathematical_lectures/probabilistic_methods"
            "mathematical_lectures/general_notes_experiments"
            "physics_lectures/physics_basics"
            "physics_lectures/classical_field_theory"
            "physics_lectures/general_notes_experiments"
          )

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            changed_files="MANUAL_WORKFLOW_DISPATCH"
            build_all=true
            require_pdf_changes=false
          else
            before="${{ github.event.before }}"
            after="${{ github.sha }}"

            if [[ "${before}" =~ ^0+$ ]]; then
              changed_files="$(git ls-tree -r --name-only "${after}")"
            else
              changed_files="$(git diff --name-only "${before}" "${after}")"
            fi

            changed_files="$(printf '%s\n' "${changed_files}" | grep -Ev '^mathematical_lectures/basic_mathematics/prezentation/' || true)"

            build_all=false
            if printf '%s\n' "${changed_files}" | grep -Eq '^shared/'; then
              build_all=true
            fi
            if printf '%s\n' "${changed_files}" | grep -Eq '^\.github/workflows/build-pdfs\.yml$'; then
              build_all=true
            fi

            require_pdf_changes=false
            if printf '%s\n' "${changed_files}" | grep -Eq '^(shared/.*\.tex|mathematical_lectures/.*(\.tex|build\.sh)|physics_lectures/.*(\.tex|build\.sh))$'; then
              require_pdf_changes=true
            fi
          fi

          echo "Changed files:"
          printf '%s\n' "${changed_files}"
          echo "Require PDF changes: ${require_pdf_changes}"

          if [[ "${build_all}" == "true" ]]; then
            projects=("${all_projects[@]}")
          else
            projects=()
            for project in "${all_projects[@]}"; do
              if printf '%s\n' "${changed_files}" | grep -Eq "^${project}/"; then
                projects+=("${project}")
              fi
            done
          fi

          if [[ "${#projects[@]}" -eq 0 ]]; then
            echo "No project needs rebuilding."
            echo "projects=" >> "${GITHUB_OUTPUT}"
            echo "require_pdf_changes=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          printf 'Projects to build:\n'
          printf '%s\n' "${projects[@]}"
          echo "projects=${projects[*]}" >> "${GITHUB_OUTPUT}"
          echo "require_pdf_changes=${require_pdf_changes}" >> "${GITHUB_OUTPUT}"

      - name: Build changed lecture PDFs
        if: steps.detect.outputs.projects != ''
        uses: xu-cheng/texlive-action@v3
        with:
          texlive_version: latest
          run: |
            set -euo pipefail
            projects_to_build='${{ steps.detect.outputs.projects }}'
            read -r -a projects <<< "${projects_to_build}"

            for project in "${projects[@]}"; do
              echo "::group::Building ${project}"
              if [[ ! -f "${project}/build.sh" ]]; then
                echo "Missing build script: ${project}/build.sh" >&2
                exit 1
              fi
              bash "${project}/build.sh"
              pdf="${project}/main.pdf"
              if [[ ! -s "${pdf}" ]]; then
                echo "Expected PDF was not generated or is empty: ${pdf}" >&2
                exit 1
              fi
              ls -lh "${pdf}"
              echo "::endgroup::"
            done

      - name: Commit changed PDFs
        if: steps.detect.outputs.projects != ''
        env:
          PROJECTS_TO_BUILD: ${{ steps.detect.outputs.projects }}
          REQUIRE_PDF_CHANGES: ${{ steps.detect.outputs.require_pdf_changes }}
        run: |
          set -euo pipefail
          read -r -a projects <<< "${PROJECTS_TO_BUILD}"

          pdfs=()
          for project in "${projects[@]}"; do
            pdf="${project}/main.pdf"
            if [[ ! -s "${pdf}" ]]; then
              echo "Expected PDF was not generated or is empty: ${pdf}" >&2
              exit 1
            fi
            pdfs+=("${pdf}")
          done

          echo "PDF files considered for commit:"
          printf '%s\n' "${pdfs[@]}"
          ls -lh "${pdfs[@]}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${pdfs[@]}"

          echo "Git status after PDF build:"
          git status --short
          echo "Staged PDF diff stat:"
          git diff --cached --stat -- "${pdfs[@]}" || true

          if git diff --cached --quiet -- "${pdfs[@]}"; then
            if [[ "${REQUIRE_PDF_CHANGES}" == "true" ]]; then
              echo "ERROR: PDF build completed, but no generated PDF changed after source changes." >&2
              echo "Check whether main.tex includes the changed source, whether build.sh writes to main.pdf, and whether the expected project was selected." >&2
              exit 1
            fi
            echo "PDF build completed and generated PDFs are identical to the committed versions."
            echo "No PDF commit is needed for this workflow-only or manual validation run."
            exit 0
          fi

          git commit -m "Build lecture PDFs"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push