name: Auto-dispatch lecture builds

# Temporarily disabled: manual dispatch only.
on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: auto-dispatch-lecture-builds
  cancel-in-progress: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch affected lecture PDF build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          gh workflow run build-pdfs.yml \
            --repo "${{ github.repository }}" \
            --ref main \
            -f before_sha="${BEFORE_SHA}" \
            -f after_sha="${AFTER_SHA}"
