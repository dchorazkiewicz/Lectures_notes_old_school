name: Auto-dispatch lecture builds

on:
  push:
    branches:
      - main
    paths:
      - "mathematical_lectures/**/*.tex"
      - "mathematical_lectures/**/build.sh"
      - "physics_lectures/**/*.tex"
      - "physics_lectures/**/build.sh"
      - "shared/**/*.tex"
      - ".github/workflows/build-pdfs.yml"

permissions:
  actions: write
  contents: read

concurrency:
  group: auto-dispatch-lecture-builds
  cancel-in-progress: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch lecture PDF build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run build-pdfs.yml --repo "${{ github.repository }}" --ref main
