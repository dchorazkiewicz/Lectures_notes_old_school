name: Auto-dispatch lecture builds

on:
  push:
    branches:
      - main
    paths:
      - 'shared/**/*.tex'
      - 'mathematical_lectures/**/*.tex'
      - 'mathematical_lectures/**/build.sh'
      - 'physics_lectures/**/*.tex'
      - 'physics_lectures/**/build.sh'
      - '.github/workflows/build-pdfs.yml'
      - '.github/workflows/auto-dispatch-builds.yml'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: auto-dispatch-lecture-builds
  cancel-in-progress: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch affected lecture PDF build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          gh workflow run build-pdfs.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ github.ref_name }}" \
            -f before_sha="${BEFORE_SHA}" \
            -f after_sha="${AFTER_SHA}"
